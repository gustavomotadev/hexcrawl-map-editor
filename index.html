<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexcrawl Map Editor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark">

  <div class="container-fluid vh-100 m-0 p-0 overflow-hidden">

    <header class="d-flex flex-nowrap overflow-x-auto position-fixed top-0 start-0 m-0 p-0">
      <button class="btn btn-dark border-2 border-secondary rounded-3 px-2 py-0 ms-2 mt-2" type="button"
        data-bs-toggle="collapse" data-bs-target="#toolTray">
        <i class="bi bi-three-dots fs-2"></i>
      </button>

      <div class="collapse collapse-horizontal" id="toolTray">

        <button id="btn-color" class="btn btn-dark border-2 border-secondary rounded-3 px-2 py-0 ms-2 mt-2"
          type="button" data-bs-toggle="collapse" data-bs-target="#colorTray">
          <i class="bi bi-droplet-fill fs-2"></i>
        </button>

      </div>

      <!-- <div class="collapse collapse-horizontal" id="colorTray">

        <button id="btn-color" class="btn btn-dark border-2 border-secondary rounded-3 px-2 py-0 ms-2 mt-2"
          type="button" data-bs-toggle="collapse" data-bs-target="#colorTray">
          <i class="bi bi-circle-fill fs-2"></i>
        </button>

      </div> -->
    </header>

    <div id="app" class="bg-dark h-100 v-100">
      <!-- D3 will render SVG here -->
    </div>

  </div>

  <!-- Bootstrap JS (With Popper.js) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="scripts.js"></script>
</body>

</html>
